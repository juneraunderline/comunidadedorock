<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Teste Ultra Simples - Imagens</title>
    <style>
        * { margin:0; padding:0; }
        body { background: #000; color: #fff; font-family: Arial; padding: 40px; }
        h1 { margin-bottom: 30px; }
        .posts-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .post-card { border: 1px solid #e91e63; padding: 0; overflow: hidden; }
        .post-img { width: 100%; height: 250px; background: #222; display: block; }
        .post-info { padding: 15px; background: #111; }
        .post-info h3 { color: #e91e63; font-size: 14px; margin: 10px 0; }
        .post-info p { font-size: 12px; color: #999; }
        .error-msg { color: #f00; padding: 20px; background: #300; margin: 20px 0; }
        .ok-msg { color: #0f0; padding: 20px; background: #030; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>🖼️ TESTE ULTRA SIMPLES - Imagens dos Posts</h1>
    <div id="status">Carregando...</div>
    <div id="posts"></div>

    <script>
        console.log('Iniciando teste...');

        fetch('http://https://comunidadedorock.onrender.com/api/posts')
            .then(res => {
                console.log('Resposta da API:', res.status);
                return res.json();
            })
            .then(posts => {
                console.log('Posts recebidos:', posts.length);

                let html = `<div class="ok-msg">✅ ${posts.length} posts carregados com sucesso</div>`;
                html += '<div class="posts-container">';

                posts.slice(0, 6).forEach((post, idx) => {
                    console.log(`Post ${idx}:`, {
                        id: post.id,
                        title: post.title?.substring(0, 30),
                        image: post.image,
                        source: post.source
                    });

                    html += `
                        <div class="post-card">
                            <img 
                                class="post-img"
                                src="${post.image || ''}" 
                                alt="Post ${post.id}"
                                onload="console.log('✅ Carregou:', this.src)"
                                onerror="console.log('❌ Erro:', this.src); this.style.background='#600'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.textContent='❌ ERRO';"
                            >
                            <div class="post-info">
                                <p><strong>#${post.id}</strong> ${post.source || 'N/A'}</p>
                                <h3>${post.title?.substring(0, 35) || 'sem título'}...</h3>
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
                document.getElementById('posts').innerHTML = html;
                document.getElementById('status').innerHTML = '';
            })
            .catch(err => {
                console.error('Erro:', err);
                document.getElementById('status').innerHTML = `<div class="error-msg">❌ Erro: ${err.message}</div>`;
            });
    </script>
</body>
</html>
