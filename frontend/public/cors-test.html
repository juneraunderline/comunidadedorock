<!DOCTYPE html>
<html>
<head>
    <title>Teste de Imagens com CORS</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; padding: 20px; }
        .test { margin: 20px 0; padding: 20px; border: 1px solid #333; }
        img { max-width: 300px; height: auto; margin: 10px 0; }
        .ok { color: #0f0; } .fail { color: #f00; }
    </style>
</head>
<body>
    <h1>🖼️ Teste de CORS para Imagens</h1>
    
    <div class="test">
        <h2>1️⃣ Testando imagem direto do backend</h2>
        <p>Backend: <span id="backend"></span></p>
        <img id="img1" src="http://https://comunidadedorock.onrender.com/images/392c04cc30dc91bc83f3503a1028af99.jpg" alt="Test">
        <p id="status1">Carregando...</p>
    </div>

    <div class="test">
        <h2>2️⃣ Fetching a imagem com fetch API</h2>
        <p id="status2">Testando...</p>
    </div>

    <script>
        document.getElementById('img1').onload = function() {
            document.getElementById('status1').innerHTML = '<span class="ok">✅ Imagem carregada com sucesso!</span>';
        };
        document.getElementById('img1').onerror = function() {
            document.getElementById('status1').innerHTML = '<span class="fail">❌ Erro ao carregar imagem</span>';
        };

        fetch('http://https://comunidadedorock.onrender.com/images/392c04cc30dc91bc83f3503a1028af99.jpg')
            .then(res => {
                console.log('Status:', res.status);
                console.log('Headers:', res.headers);
                document.getElementById('status2').innerHTML = `<span class="ok">✅ Fetch retornou ${res.status}</span>`;
            })
            .catch(err => {
                document.getElementById('status2').innerHTML = `<span class="fail">❌ ${err.message}</span>`;
            });

        fetch('http://https://comunidadedorock.onrender.com/api/posts')
            .then(res => res.json())
            .then(data => {
                document.getElementById('backend').innerHTML = `<span class="ok">✅ ${data.length} posts</span>`;
            })
            .catch(err => {
                document.getElementById('backend').innerHTML = `<span class="fail">❌ ${err.message}</span>`;
            });
    </script>
</body>
</html>
