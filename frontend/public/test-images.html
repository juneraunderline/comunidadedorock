<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Imagens</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: #111;
            border: 1px solid #333;
            margin: 20px 0;
            overflow: hidden;
            border-radius: 4px;
        }
        .card-image {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #333 0%, #111 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-source {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(233, 30, 99, 0.9);
            color: #fff;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 3px;
            font-weight: 700;
        }
        .card-content {
            padding: 20px;
        }
        .card-content h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
        }
        .card-content p {
            color: #999;
            font-size: 13px;
            margin: 0;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .error {
            color: #e91e63;
            text-align: center;
            padding: 20px;
            background: rgba(233, 30, 99, 0.1);
            border-radius: 4px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Teste de Carregamento de Imagens</h1>
        <p>Carregando posts...</p>
        <div id="posts" class="loading">Aguarde...</div>
    </div>

    <script>
        fetch('http://localhost:3000/api/posts')
            .then(res => res.json())
            .then(posts => {
                console.log("Posts recebidos:", posts.length);
                
                const postsDiv = document.getElementById('posts');
                postsDiv.innerHTML = '';

                if (posts.length === 0) {
                    postsDiv.innerHTML = '<div class="error">❌ Nenhum post encontrado</div>';
                    return;
                }

                posts.slice(0, 5).forEach(post => {
                    console.log("Post:", {
                        id: post.id,
                        title: post.title?.substring(0, 30),
                        image: post.image,
                        source: post.source
                    });

                    const cardDiv = document.createElement('div');
                    cardDiv.className = 'card';

                    let imageHTML = '';
                    if (post.image) {
                        imageHTML = `
                            <div class="card-image">
                                <img src="${post.image}" alt="${post.title}" onerror="this.parentElement.innerHTML='❌ Erro ao carregar imagem'; this.parentElement.style.background='#e91e6330';">
                                <div class="card-source">${post.source || 'Desconhecida'}</div>
                            </div>
                        `;
                    } else {
                        imageHTML = '<div class="card-image"><div style="text-align:center">❌ Sem imagem</div></div>';
                    }

                    cardDiv.innerHTML = `
                        ${imageHTML}
                        <div class="card-content">
                            <h3>${post.title}</h3>
                            <p>Fonte: ${post.source || 'Desconhecida'}</p>
                            <p>${(post.content || '').substring(0, 100)}...</p>
                        </div>
                    `;

                    postsDiv.appendChild(cardDiv);
                });

                postsDiv.innerHTML += `<p style="margin-top: 40px; text-align: center; color: #666;">✅ Testados ${Math.min(5, posts.length)} posts de ${posts.length} total</p>`;
            })
            .catch(err => {
                console.error("Erro:", err);
                document.getElementById('posts').innerHTML = `<div class="error">❌ Erro ao carregar posts: ${err.message}</div>`;
            });
    </script>
</body>
</html>
