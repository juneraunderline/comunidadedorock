<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Diagnóstico Completo - Imagens do Rock</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Courier New', monospace; 
      background: #1a1a1a; 
      color: #fff;
      padding: 20px;
      line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #e91e63; margin: 20px 0; margin-top: 0; }
    .section { 
      background: #222; 
      border: 1px solid #e91e63; 
      padding: 20px; 
      margin: 20px 0;
      border-radius: 5px;
    }
    h2 { color: #4caf50; margin: 15px 0; }
    h3 { color: #2196f3; margin: 10px 0; font-size: 14px; }
    .ok { color: #4caf50; }
    .error { color: #f44336; }
    .info { color: #2196f3; }
    .warn { color: #ff9800; }
    img { max-width: 200px; max-height: 200px; margin: 10px; border: 2px solid #e91e63; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 10px; margin: 10px 0; }
    .card { background: #333; padding: 10px; border: 1px solid #444; }
    code { background: #111; padding: 2px 5px; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 Diagnóstico Completo - Sistema de Imagens</h1>

    <div class="section">
      <h2>1️⃣ Verificação de Conectividade</h2>
      <div id="connectivity"></div>
    </div>

    <div class="section">
      <h2>2️⃣ Teste de Carregamento de API</h2>
      <div id="api-test"></div>
    </div>

    <div class="section">
      <h2>3️⃣ Teste de Imagem Individual</h2>
      <div id="image-test"></div>
    </div>

    <div class="section">
      <h2>4️⃣ Teste de CORS</h2>
      <div id="cors-test"></div>
    </div>

    <div class="section">
      <h2>5️⃣ Galeria de Primeiras Imagens</h2>
      <div id="gallery"></div>
    </div>

    <div class="section">
      <h2>6️⃣ Debug Informações</h2>
      <div id="debug"></div>
    </div>
  </div>

  <script>
    const baseUrl = 'http://localhost:3000';
    const apiUrl = `${baseUrl}/api/posts`;

    async function runTests() {
      // Teste 1: Conectividade
      try {
        const response = await fetch(`${baseUrl}/api/posts`, { method: 'HEAD' });
        document.getElementById('connectivity').innerHTML = `
          <p class="ok">✅ Backend está respondendo</p>
          <p class="info">Status: ${response.status}</p>
        `;
      } catch (err) {
        document.getElementById('connectivity').innerHTML = `
          <p class="error">❌ Erro de conectividade: ${err.message}</p>
        `;
        return;
      }

      // Teste 2: API
      try {
        const res = await fetch(apiUrl);
        const data = await res.json();
        
        if (Array.isArray(data) && data.length > 0) {
          document.getElementById('api-test').innerHTML = `
            <p class="ok">✅ API retornando ${data.length} posts</p>
            <h3>Primeiras 3 imagens:</h3>
            <div class="grid">
              ${data.slice(0, 3).map((p, i) => `
                <div class="card">
                  <p><strong>${i+1}. ${p.title.substring(0, 30)}...</strong></p>
                  <p class="info">Fonte: ${p.source}</p>
                  <p>${p.image}</p>
                </div>
              `).join('')}
            </div>
          `;

          // Teste 3: Primeira imagem
          const firstImage = data[0]?.image;
          if (firstImage) {
            document.getElementById('image-test').innerHTML = `
              <h3>Testando: ${firstImage}</h3>
              <img id="test-img" src="${firstImage}" 
                   onload="document.getElementById('image-test').innerHTML += '<p class=ok>✅ Imagem carregada!</p>'"
                   onerror="document.getElementById('image-test').innerHTML += '<p class=error>❌ Falha ao carregar: ' + this.src + '</p>'"
              />
            `;
          }

          // Teste 4: CORS
          try {
            const corsRes = await fetch(firstImage || `${baseUrl}/images/392c04cc30dc91bc83f3503a1028af99.jpg`);
            const corsHeader = corsRes.headers.get('access-control-allow-origin');
            document.getElementById('cors-test').innerHTML = `
              <p class="ok">✅ Requisição CORS bem-sucedida</p>
              <p>Access-Control-Allow-Origin: <code>${corsHeader || 'N/A'}</code></p>
            `;
          } catch (corsErr) {
            document.getElementById('cors-test').innerHTML = `
              <p class="error">❌ Erro CORS: ${corsErr.message}</p>
            `;
          }

          // Teste 5: Galeria
          document.getElementById('gallery').innerHTML = `
            <p>Mostrando primeiras ${Math.min(6, data.length)} imagens:</p>
            <div>
              ${data.slice(0, 6).map(p => `
                <img src="${p.image}" alt="${p.title}" title="${p.title}">
              `).join('')}
            </div>
          `;
        } else {
          document.getElementById('api-test').innerHTML = `
            <p class="error">❌ API retornou dados inválidos</p>
          `;
        }
      } catch (err) {
        document.getElementById('api-test').innerHTML = `
          <p class="error">❌ Erro ao carregar API: ${err.message}</p>
        `;
      }

      // Debug
      document.getElementById('debug').innerHTML = `
        <h3>Informações de Debug:</h3>
        <p>URL Base: <code>${baseUrl}</code></p>
        <p>URL API: <code>${apiUrl}</code></p>
        <p>User Agent: <code>${navigator.userAgent.substring(0, 50)}...</code></p>
        <p>Timestamp: <code>${new Date().toLocaleString('pt-BR')}</code></p>
      `;
    }

    // Executar testes ao carregar
    runTests();
  </script>
</body>
</html>
