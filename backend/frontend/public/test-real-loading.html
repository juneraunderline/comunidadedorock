<!DOCTYPE html>
<html>
<head>
    <title>Teste Simples de Carregamento</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { border: 1px solid #333; padding: 20px; margin: 20px 0; }
        img { max-width: 100%; height: 250px; object-fit: cover; background: #222; display: block; }
        .source { color: #e91e63; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Teste de Carregamento Real das Imagens</h1>
        <p id="loading">Carregando posts...</p>
        <div id="posts"></div>
    </div>

    <script>
        // Simular exatamente o que React faz
        fetch('http://localhost:3000/api/posts')
            .then(res => res.json())
            .then(posts => {
                console.log("📊 Posts recebidos:", posts.length);
                document.getElementById('loading').textContent = `✅ ${posts.length} posts carregados`;

                const postsDiv = document.getElementById('posts');
                posts.slice(0, 3).forEach((post, idx) => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    console.log(`Post ${idx}:`, {
                        title: post.title.substring(0, 30),
                        image: post.image,
                        source: post.source
                    });

                    card.innerHTML = `
                        <h3>${post.title}</h3>
                        <div class="source">Fonte: ${post.source || 'Desconhecida'}</div>
                        <img 
                            src="${post.image}" 
                            alt="${post.title}"
                            onerror="console.log('❌ Erro ao carregar:', this.src); this.style.display='none';"
                            onload="console.log('✅ Imagem carregou:', this.src)"
                        >
                        <p>${post.content.substring(0, 100)}...</p>
                    `;

                    postsDiv.appendChild(card);
                });
            })
            .catch(err => {
                console.error("❌ Erro:", err);
                document.getElementById('loading').textContent = `❌ Erro: ${err.message}`;
            });
    </script>
</body>
</html>
